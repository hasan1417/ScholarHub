name: Weekly Security Scan

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Backend dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          echo "## Backend Dependencies" >> "$GITHUB_STEP_SUMMARY"
          pip-audit -r requirements.txt --format markdown >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          pip-audit -r requirements.txt

      - name: Frontend dependency audit (npm audit)
        working-directory: frontend
        run: |
          echo "## Frontend Dependencies" >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          npm audit --omit=dev --audit-level=high
